{% extends "base.html" %}
{% block content %}
<div class="layout">
    {% include "sidebar.html" %}

    <section class="content">
        <div class="page-title">
            <div>
                <h1>Yeni Proje Tanımlama</h1>
                <p>Öğrencilerin başvuracağı proje bilgilerini eksiksiz girin.</p>
            </div>
        </div>

        <div class="form-card wide">
            <form method="POST" class="form-grid">
                <div>
                    <label>Proje Kodu</label>
                    <input name="code" placeholder="Örn: PRJ-2026-001" required>
                </div>

                <div>
                    <label>Proje Kategorisi</label>
                    <input name="category" placeholder="Örn: Web, Mobil, Veritabanı">
                </div>

                <div>
                    <label>Kontenjan</label>
                    <input name="quota" type="number" min="1" value="1" required>
                </div>

                <div>
                    <label>Son Başvuru Tarihi</label>
                    <input name="deadline" type="date">
                </div>

                <div class="full-field">
                    <label>Proje Başlığı</label>
                    <input name="title" required>
                </div>

                <div class="full-field">
                    <label>Proje Açıklaması</label>
                    <textarea name="description" placeholder="Amaç, kapsam, beklenen çıktı ve teslim şartlarını yazınız." required></textarea>
                </div>

                <div class="form-actions">
                    <button class="btn full" type="submit">Projeyi Kaydet</button>
                </div>
            </form>
        </div>
    </section>
</div>
{% endblock %}
